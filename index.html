<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="index.css">
    <title>HEALIX / Login</title>
</head>

<body>

    <div class="container" id="container">
        <div class="form-container sign-up">
            <form>
                <h1>Pharmacist</h1>
                <input type="text" id="pharmacistID" placeholder="ID" required>
                <input type="password" id="pharmacistPassword" placeholder="Password" required>
                <button type="button" id="pharmacistLoginBtn" onclick="navigateTo('pharmacist.html','pharmacistID','pharmacistPassword')">Login</button>
            </form>
        </div>
        <div class="form-container sign-in">
            <form>
                <h1>Admin</h1>
                <input type="text" id="adminID" placeholder="ID" required>
                <input type="password" id="adminPassword" placeholder="Password" required>
                <button type="button" id="adminLoginBtn" onclick="navigateTo('dashboard.html', 'adminID', 'adminPassword')">Login</button>
            </form>
        </div>
        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                    <h1>Hello, Admin!</h1>
                    <p>Enter your personal ID to use all features</p>
                    <button class="hidden" id="login"><<<</button>
                </div>
                <div class="toggle-panel toggle-right">
                    <h1>Hello, Pharmacist!</h1>
                    <p>Login with your personal ID to use all features</p>
                    <button class="hidden" id="register">>>></button>
                </div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
