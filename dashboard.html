<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEALIX / Dashboard</title>
    <!-- ======= Styles ====== -->
    <link rel="stylesheet" href="dashboard.css">
</head>

<body>
    <!-- =============== Navigation ================ -->
    <div class="container">
        <div class="navigation">
            <ul>
                <li>
                    <a href="#">
                        <span class="icon">
                            <ion-icon name="medkit-outline"></ion-icon>                        
                        </span>
                        <span class="title healix">HEALIX</span>
                    </a>
                </li>

                <li>
                    <a href="dashboard.html">
                        <span class="icon">
                            <ion-icon name="home-outline"></ion-icon>
                        </span>
                        <span class="title">Dashboard</span>
                    </a>
                </li>

                <li>
                    <a href="addpharmacist.html">
                        <span class="icon">
                            <ion-icon name="people-outline"></ion-icon>
                        </span>
                        <span class="title">Add/Remove Pharmacist</span>
                    </a>
                </li>

                <li>
                    <a href="viewmedicine.html">
                        <span class="icon">
                            <ion-icon name="eye-outline"></ion-icon>                        
                        </span>
                        <span class="title">View Stocks</span>
                    </a>
                </li>

                <li>
                    <a href="addmedicines.html">
                        <span class="icon">
                            <ion-icon name="bandage-outline"></ion-icon>
                        </span>
                        <span class="title">Add Medicines</span>
                    </a>
                </li>

                <li>
                    <a href="addstock.html">
                        <span class="icon">
                            <ion-icon name="add-circle-outline"></ion-icon>
                        </span>
                        <span class="title">Add Stock</span>
                    </a>
                </li>

                <li>
                    <a href="ordermedicine.html">
                        <span class="icon">
                            <ion-icon name="sync-circle-outline"></ion-icon>
                        </span>
                        <span class="title">Place Orders</span>
                    </a>
                </li>

                <li>
                    <a href="notification.html">
                        <span class="icon">
                            <ion-icon name="mail-unread-outline"></ion-icon>
                        </span>
                        <span class="title">Notification</span>
                    </a>
                </li>

                <li>
                    <a href="#" onclick="logout()">
                        <span class="icon">
                            <ion-icon name="log-out-outline"></ion-icon>
                        </span>
                        <span class="title">Log Out</span>
                    </a>
                </li>
            </ul>
        </div>

        <!-- ========================= Main ==================== -->
        <div class="main">
            <div class="topbar">
                <div class="toggle">
                    <ion-icon name="menu-outline"></ion-icon>
                </div>

                <!-- <div class="search">
                    <label>
                        <input type="text" placeholder="Search here">
                        <ion-icon name="search-outline"></ion-icon>
                    </label>
                </div> -->

            </div>

            <!-- ======================= Cards ================== -->
            <div class="cardBox">
                <div class="card sales">
                    <div>
                        <div class="numbers">0</div> <!-- Default value -->
                        <div class="cardName">Sales</div>
                    </div>
                    <div class="iconBx">
                        <ion-icon name="cart-outline"></ion-icon>
                    </div>
                </div>
            
                <div class="card earnings">
                    <div>
                        <div class="numbers">₹0.00</div> <!-- Default value -->
                        <div class="cardName">Earning</div>
                    </div>
                    <div class="iconBx">
                        <ion-icon name="cash-outline"></ion-icon>
                    </div>
                </div>
            </div>
            <!-- ================ Order Details List ================= -->
            <div class="details">
                <div class="recentOrders" >
                    <div class="cardHeader">
                        <h2>Recent Orders</h2>
                    </div>

                    <table>
                        <thead >
                            <tr>
                                <td>Order ID</td>
                                <td>Supplier Name</td>
                                <td>Medicine Name</td>
                                <td>Quantity</td>
                            </tr>
                        </thead>

                        <tbody>
                            <!-- This will be populated dynamically by JavaScript -->
                        </tbody>
                    </table>
                </div>

                <!-- ================= New Customers ================ -->
                <div class="recentCustomers">
                    <div class="cardHeader">
                        <h2>Recent Customers</h2>
                    </div>
                
                    <div class="customerList">
                        <!-- This will be populated dynamically by JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- =========== Scripts =========  -->
    <script src="dashboard.js"></script>

    <!-- ====== ionicons ======= -->
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>

</html>
